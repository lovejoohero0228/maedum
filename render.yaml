services:
  - type: web
    name: maedum-web
    runtime: static
    buildCommand: npm install && npm run build:web
    staticPublishPath: ./dist
    envVars:
      - key: EXPO_PUBLIC_SUPABASE_URL
        sync: false
      - key: EXPO_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: EXPO_PUBLIC_APP_ENV
        value: production
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
